name: Deploy to joseplatero.com
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      # Syncs only changed files (keeps a state file on the server),
      # so the 100MB of video uploads once, not on every deploy.
      - name: Sync to joseplatero.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /public_html/joseplatero.com/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
